name: Teedy CI Pipeline
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Build
        run: mvn clean package
      - name: PMD Check
        run: mvn pmd:pmd
      - name: Test
        run: mvn test
      - name: Test Report
        run: mvn surefire-report:report
      - name: Javadoc
        run: mvn javadoc:jar