name: Teedy CI Pipeline
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build with Maven
        run: mvn clean package -DskipTests
      - name: PMD Check
        run: mvn pmd:pmd || echo "PMD check failed, but continue"
      - name: Test
        run: mvn test -DfailIfNoTests=false
      - name: Generate Test Report
        run: mvn surefire-report:report || echo "Test report failed, but continue"
      - name: Generate Javadoc
        run: mvn javadoc:jar || echo "Javadoc failed, but continue"